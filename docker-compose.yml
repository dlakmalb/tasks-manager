services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tasks_manager_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: tasks_manager
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_FROM_ADDRESS: hello@example.com
      MAIL_FROM_NAME: "Task Manager"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tasks_manager

  web:
    image: nginx:1.27-alpine
    container_name: tasks_manager_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - tasks_manager

  db:
    image: mysql:8.0
    container_name: tasks_manager_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tasks_manager
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "3307:3306"
    networks:
      - tasks_manager

  mailpit:
    image: axllent/mailpit:latest
    container_name: tasks_manager_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - tasks_manager

  vite:
    image: node:22-alpine
    container_name: tasks_manager_vite
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    networks:
      - tasks_manager

volumes:
  db_data:

networks:
  tasks_manager:
    driver: bridge
